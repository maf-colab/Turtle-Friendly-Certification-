<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtle Friendly Certification (TFC) | Nature-Positive Standard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for component logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; margin: 0; }
        .font-serif { font-family: 'Playfair+Display', serif; }
        
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1.05); }
            50% { transform: scale(1.08); }
        }
        .animate-pulse-slow { animation: pulse-slow 15s ease-in-out infinite; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 1s ease-out forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Custom Icon Component to handle Lucide in React
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('landing');
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const dimensions = [
                { id: 1, icon: "umbrella", title: 'Protection and Habitat Management', objective: 'Protect nesting beaches, dunes, and near‑shore habitats from direct hotel impacts.', why: 'Immediate biological pressure reduction.' },
                { id: 2, icon: "lightbulb", title: 'Operations and Infrastructure', objective: 'Integrate controls into engineering, housekeeping, and procurement.', why: 'Operational durability.' },
                { id: 3, icon: "users", title: 'Guest Experience and Education', objective: 'Shape guest behavior and design ethical, low‑impact experiences.', why: 'Adds high guest value.' },
                { id: 4, icon: "globe", title: 'Community Engagement', objective: 'Build local partnerships and share conservation benefits.', why: 'Increased destination legitimacy.' },
                { id: 5, icon: "database", title: 'Monitoring & Data', objective: 'Track performance and learn over time via adaptive management.', why: 'Measurable impact change.' },
                { id: 6, icon: "scale", title: 'Governance & Compliance', objective: 'Ensure consistency, brand control, and procedural fairness.', why: 'Trust with authorities & NGOs.' }
            ];

            const tiers = [
                { name: 'Tier 1 – Verified', color: 'from-amber-600 to-amber-800', tag: 'Foundational', features: ['Lighting fixed', 'Furniture managed', 'Vehicles restricted', 'Core SOPs active'] },
                { name: 'Tier 2 – Advanced', color: 'from-slate-400 to-slate-600', tag: 'Excellence', features: ['Structured lighting plan', 'Contractual clauses', 'Staff training', 'KPI tracking'] },
                { name: 'Tier 3 – Leadership', color: 'from-yellow-400 to-yellow-600', tag: 'Stewardship', features: ['Zero-visible light', 'Dune restoration', 'Data sharing', 'Public reporting'] }
            ];

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 px-6 ${scrolled ? 'py-4 bg-slate-950/90 backdrop-blur-md border-b border-white/10' : 'py-8 bg-transparent'}`}>
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setActiveTab('landing')}>
                                <div className="w-10 h-10 bg-teal-500 rounded-lg flex items-center justify-center">
                                    <Icon name="waves" className="text-slate-950 w-6 h-6" />
                                </div>
                                <div>
                                    <span className="block text-xl font-black italic leading-none">TFC</span>
                                    <span className="block text-[8px] font-bold text-teal-400 uppercase tracking-widest">Nature-Positive</span>
                                </div>
                            </div>
                            <div className="flex gap-8 items-center">
                                <button onClick={() => setActiveTab('landing')} className={`text-[10px] font-bold uppercase tracking-widest ${activeTab === 'landing' ? 'text-teal-400' : 'text-slate-400'}`}>Proposition</button>
                                <button onClick={() => setActiveTab('framework')} className={`text-[10px] font-bold uppercase tracking-widest ${activeTab === 'framework' ? 'text-teal-400' : 'text-slate-400'}`}>Standard</button>
                                <button className="px-4 py-2 bg-white text-slate-950 text-[10px] font-black uppercase rounded hover:bg-teal-400 transition-colors">Portal</button>
                            </div>
                        </div>
                    </nav>

                    {activeTab === 'landing' ? (
                        <div className="animate-fade-in">
                            {/* Hero */}
                            <section className="relative h-screen flex items-center justify-center text-center px-6 overflow-hidden">
                                <div className="absolute inset-0 z-0">
                                    <div className="absolute inset-0 bg-gradient-to-b from-blue-950/80 via-blue-950/40 to-slate-950 z-10"></div>
                                    <img src="https://images.unsplash.com/photo-1437622368342-7a3d73a34c8f?auto=format&fit=crop&q=80&w=2000" className="w-full h-full object-cover animate-pulse-slow" />
                                </div>
                                <div className="relative z-20 max-w-5xl">
                                    <div className="mb-6 inline-block px-3 py-1 rounded-full bg-teal-500/20 border border-teal-400/30 text-teal-300 text-[10px] font-bold uppercase tracking-widest">Coastal Biodiversity Standard</div>
                                    <h1 className="text-4xl md:text-7xl font-black mb-6 leading-tight">
                                        Turtle Friendly Certification (TFC)<br />
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-teal-300 to-blue-200 font-serif italic">
                                            A Nature-Positive Coastal Hospitality Standard
                                        </span>
                                    </h1>
                                    <p className="text-lg md:text-xl text-slate-300 mb-10 max-w-3xl mx-auto font-light">Bridging marine science and hotel operations to create a marketable, scalable standard for the world's most sensitive destinations.</p>
                                    <div className="flex flex-wrap justify-center gap-4">
                                        <button onClick={() => setActiveTab('framework')} className="px-8 py-4 bg-teal-500 text-slate-950 font-bold rounded-full flex items-center gap-2 hover:bg-teal-400 transition-all">
                                            Explore Dimensions <Icon name="arrow-right" className="w-4 h-4" />
                                        </button>
                                    </div>
                                </div>
                            </section>
                        </div>
                    ) : (
                        <div className="pt-32 pb-20 px-6 animate-fade-in">
                            <div className="max-w-7xl mx-auto text-center mb-16">
                                <h2 className="text-teal-400 font-bold uppercase tracking-widest text-xs mb-4">Implementation</h2>
                                <h3 className="text-5xl font-black mb-6">The Six Core Dimensions</h3>
                            </div>
                            <div className="max-w-7xl mx-auto grid md:grid-cols-2 lg:grid-cols-3 gap-6 mb-24">
                                {dimensions.map(d => (
                                    <div key={d.id} className="p-8 rounded-3xl bg-slate-900/50 border border-white/5 hover:border-teal-500/40 transition-all group">
                                        <div className="w-12 h-12 bg-teal-500/10 text-teal-400 rounded-xl flex items-center justify-center mb-6"><Icon name={d.icon} /></div>
                                        <h4 className="text-xl font-bold mb-3">{d.title}</h4>
                                        <p className="text-sm text-slate-400 leading-relaxed">{d.objective}</p>
                                        <div className="mt-4 pt-4 border-t border-white/5 text-[10px] text-teal-500 font-bold uppercase tracking-widest italic">{d.why}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="max-w-7xl mx-auto grid lg:grid-cols-3 gap-8">
                                {tiers.map(t => (
                                    <div key={t.name} className="rounded-[2.5rem] bg-slate-900 border border-white/5 overflow-hidden">
                                        <div className={`h-2 bg-gradient-to-r ${t.color}`}></div>
                                        <div className="p-10">
                                            <span className="text-[10px] font-bold text-teal-400 uppercase tracking-widest">{t.tag}</span>
                                            <h5 className="text-2xl font-bold mt-2 mb-6">{t.name}</h5>
                                            <ul className="space-y-4 mb-8">
                                                {t.features.map(f => (
                                                    <li key={f} className="flex items-center gap-3 text-sm text-slate-400"><Icon name="check-circle-2" className="w-4 h-4 text-teal-500" /> {f}</li>
                                                ))}
                                            </ul>
                                            <button className="w-full py-3 bg-white/5 rounded-xl text-xs font-bold uppercase hover:bg-white/10 transition-all border border-white/10">Audit Logic</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <footer className="py-20 px-6 border-t border-white/5 text-center">
                        <div className="flex justify-center items-center gap-2 mb-6 opacity-50">
                            <Icon name="waves" className="text-teal-500 w-5 h-5" />
                            <span className="text-sm font-bold tracking-tighter uppercase italic">Turtle Friendly Certification</span>
                        </div>
                        <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">© 2024 TFC Global. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
